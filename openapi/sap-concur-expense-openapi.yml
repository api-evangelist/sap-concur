                    postedAmount:
                      value: 42.5
                      currencyCode: example_value
                    approvedAmount:
                      value: 42.5
                      currencyCode: example_value
                    approverAdjustedAmount:
                      value: 42.5
                      currencyCode: example_value
                    businessPurpose: example_value
                    expenseType:
                      id: abc123
                      name: Example Title
                      code: example_value
                      isDeleted: true
                    paymentType:
                      id: abc123
                      name: Example Title
                      code: example_value
                    location:
                      id: abc123
                      name: Example Title
                      city: example_value
                      countryCode: example_value
                      countrySubDivisionCode: example_value
                    vendor:
                      id: abc123
                      name: Example Title
                      description: A sample description.
                    exchangeRate:
                      value: 42.5
                      operation: MULTIPLY
                    allocationState: FULLY_ALLOCATED
                    isPersonalExpense: true
                    isExpenseRejected: true
                    isPaperReceiptReceived: true
                    hasExceptions: true
                    expenseTaxSummary: {}
                    mileage:
                      totalDistance: 10
                      vehicleId: '500123'
                      odometerStart: 10
                      odometerEnd: 10
                      passengerCount: 10
                      personalDistance: 10
                      isMarkedAsHigherRate: true
                      routeId: '500123'
                      hasMachinery: true
                    travel:
                      startLocation: example_value
                      endLocation: example_value
                      ticketNumber: example_value
                      hotelCheckinDate: '2026-01-15'
                      hotelCheckoutDate: '2026-01-15'
