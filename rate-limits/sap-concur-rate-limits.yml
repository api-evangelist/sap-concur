specification: API Commons Rate Limits
specificationVersion: '0.1'
schema: https://raw.githubusercontent.com/api-evangelist/interface-research/main/schema/api-commons.yml#/$defs/RateLimits
provider: SAP Concur
providerId: sap-concur
created: '2026-05-04'
modified: '2026-05-05'
reconciled: false
tags:
  - Rate Limiting
  - Business Travel
  - Expense Management
  - Financial Services
  - Invoice Management
  - Travel Management
description: SAP Concur platform APIs (Travel, Expense, Invoice, Identity v4) require partner registration; rate-limit numbers are not published in the public developer portal and are governed per partner application.
sources:
  - https://www.concur.com
  - https://developer.concur.com/api-reference/
notes: Provider documentation pages render via client-side JavaScript or sit behind a partner portal; static rate-limit numbers are not exposed to automated fetches. Reconcile from the per-product SAP Help Portal section or partner developer portal.
responseCodes:
  throttled: 429
limits:
  - name: Per-service quotas
    scope: account/region/service
    metric: varies
    limit: see provider documentation; gated or partner-only
policies:
  - name: Documentation location
    description: Rate limits are documented per service in the SAP Help Portal or the SAP Concur developer
      portal; consult the relevant section for current numbers.
  - name: Contract-governed
    description: Effective limits depend on the customer's BTP entitlement, partner application, or negotiated
      contract.
maintainers:
